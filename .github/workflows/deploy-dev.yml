name: Deploy Dev Site

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-subway-builder-dev-site
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy dev site
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ZONE_TAG: ${{ secrets.CLOUDFLARE_ZONE_TAG }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify analytics secrets
        shell: bash
        run: |
          zone_present=no
          token_present=no

          if [ -n "${CLOUDFLARE_ZONE_TAG}${CLOUDFLARE_ZONE_ID}" ]; then
            zone_present=yes
          fi

          if [ -n "${CLOUDFLARE_API_TOKEN}${CLOUDFLARE_TOKEN}${CF_API_TOKEN}" ]; then
            token_present=yes
          fi

          echo "Cloudflare zone present: ${zone_present}"
          echo "Cloudflare token present: ${token_present}"

      - name: Build for route discovery
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Generate analytics snapshot
        env:
          WEBSITE_PATH_SOURCE_DIR: ${{ github.workspace }}/out
        run: pnpm run analytics

      - name: Build final deploy output
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Clone target repo
        env:
          GH_PAT: ${{ secrets.WEBSITE_DEV_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/Subway-Builder-Modded/website-dev.git target-repo

      - name: Prepare gh-pages branch
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages || git checkout -b gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

      - name: Replace site contents
        run: |
          shopt -s dotglob
          rm -rf target-repo/*
          cp -R out/* target-repo/
          touch target-repo/.nojekyll
          echo "dev.subwaybuildermodded.com" > target-repo/CNAME

      - name: Commit and push
        working-directory: target-repo
        run: |
          git add --all
          git commit -m "Deploy dev site from ${GITHUB_SHA}" || echo "No changes to commit"
          git push origin gh-pages
