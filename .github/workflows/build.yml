name: Build Site

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ZONE_TAG: ${{ secrets.CLOUDFLARE_ZONE_TAG }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify analytics secrets
        shell: bash
        run: |
          zone_present=no
          token_present=no

          if [ -n "${CLOUDFLARE_ZONE_TAG}${CLOUDFLARE_ZONE_ID}" ]; then
            zone_present=yes
          fi

          if [ -n "${CLOUDFLARE_API_TOKEN}${CLOUDFLARE_TOKEN}${CF_API_TOKEN}" ]; then
            token_present=yes
          fi

          echo "Cloudflare zone present: ${zone_present}"
          echo "Cloudflare token present: ${token_present}"

      - name: Build for route discovery
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Generate analytics snapshot
        env:
          WEBSITE_PATH_SOURCE_DIR: ${{ github.workspace }}/out
        run: pnpm run generate:website-analytics

      - name: Build final output
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build
        